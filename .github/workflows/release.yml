name: Build and Release Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller maturin
          
      - name: Build Rust Core
        run: |
          maturin build --release --strip
          $wheel = Get-ChildItem target/wheels -Filter "*.whl" | Select-Object -First 1
          pip install $wheel.FullName
          
      - name: Build PyInstaller Executable
        run: pyinstaller --noconfirm Ignite.spec
        
      - name: Build Inno Setup Installer
        run: |
          # ISCC is pre-installed on windows-latest GitHub runners
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ignite_installer.iss
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: IGNITE_Setup_*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
